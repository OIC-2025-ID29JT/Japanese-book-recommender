<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Book Recommender</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Kitchen4Soul.css?v=2">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <h1 id="logoText">Kitchen4Soul</h1>
        </div>
        <nav class="app-nav">
            <button id="tabDiscover" class="nav-btn active">Discover</button>
            <button id="tabWishlist" class="nav-btn">Wishlist <span id="wishlistCount" class="badge">0</span></button>
        </nav>
        <div class="header-controls">
            <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme">🌓</button>
            <button id="langToggle" class="lang-toggle-btn">EN</button>
        </div>
    </header>

    <main class="app-container">
        <!-- Discover View -->
        <section id="viewDiscover" class="view-section">
            <div class="hero-section">
                <h2 id="heroTitle">Find Your Next Read</h2>
                <p id="heroSubtitle">Explore top Japanese books curated directly from Rakuten Books</p>
            </div>

            <!-- Search Panel -->
            <div class="search-panel">
                <div class="control-group">
                    <label id="labelGenre" for="genreSelect">Genre</label>
                    <select id="genreSelect">
                        <option value="001" data-en="All Books" data-ja="すべての書籍">All Books (すべての書籍)</option>
                        <option value="001004" data-en="Literature & Novel" data-ja="小説・エッセイ">Literature & Novel (小説・エッセイ)</option>
                        <option value="001001" data-en="Comics & Manga" data-ja="コミック">Comics & Manga (コミック)</option>
                        <option value="001006" data-en="Business & Economy" data-ja="ビジネス・経済・就職">Business & Economy (ビジネス・経済・就職)</option>
                        <option value="001017" data-en="Light Novel" data-ja="ライトノベル">Light Novel (ライトノベル)</option>
                        <option value="001005" data-en="IT & Computers" data-ja="パソコン・システム開発">IT & Computers (パソコン・システム開発)</option>
                        <option value="001010" data-en="Lifestyle & Cooking" data-ja="美容・暮らし・健康・料理">Lifestyle & Cooking (美容・暮らし・健康・料理)</option>
                        <option value="001003" data-en="Children's Books" data-ja="絵本・児童書・図鑑">Children's Books (絵本・児童書・図鑑)</option>
                        <option value="001009" data-en="Hobbies & Sports" data-ja="ホビー・スポーツ・美術">Hobbies & Sports (ホビー・スポーツ・美術)</option>
                        <option value="001011" data-en="Art & Entertainment" data-ja="エンタメ・ゲーム">Art & Entertainment (エンタメ・ゲーム)</option>
                        <option value="001007" data-en="Travel & Outdoors" data-ja="旅行・留学・アウトドア">Travel & Outdoors (旅行・留学・アウトドア)</option>
                        <option value="001002" data-en="Languages & Study" data-ja="語学・学習参考書">Languages & Study (語学・学習参考書)</option>
                        <option value="001008" data-en="Humanities & Social" data-ja="人文・思想・社会">Humanities & Social (人文・思想・社会)</option>
                        <option value="001012" data-en="Science & Technology" data-ja="科学・技術">Science & Technology (科学・技術)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label id="labelKeyword" for="keywordInput">Keyword</label>
                    <input type="text" id="keywordInput" placeholder="Search title, author...">
                </div>

                <div class="control-group">
                    <label id="labelSort" for="sortSelect">Sort By</label>
                    <select id="sortSelect">
                        <option value="standard" data-en="Standard" data-ja="標準">Standard (標準)</option>
                        <option value="sales" data-en="Popularity" data-ja="売上順">Popularity (売上順)</option>
                        <option value="reviewAverage" data-en="Highest Rating" data-ja="評価順">Highest Rating (評価順)</option>
                        <option value="reviewCount" data-en="Most Reviewed" data-ja="レビュー件数順">Most Reviewed (レビュー件数順)</option>
                        <option value="+itemPrice" data-en="Price: Low to High" data-ja="価格の安い順">Price: Low to High (価格の安い順)</option>
                        <option value="-itemPrice" data-en="Price: High to Low" data-ja="価格の高い順">Price: High to Low (価格の高い順)</option>
                        <option value="-releaseDate" data-en="Newest Releases" data-ja="新着順">Newest Releases (新着順)</option>
                    </select>
                </div>

                <div class="control-group btn-group">
                    <button id="searchBtn" class="primary-btn">Search Books</button>
                </div>
            </div>

            <!-- Results Grid -->
            <div id="results" class="book-grid"></div>
        </section>

        <!-- Wishlist View -->
        <section id="viewWishlist" class="view-section hidden">
            <div class="hero-section">
                <h2 id="wishlistTitle">My Wishlist</h2>
                <p id="wishlistSubtitle">Your saved books to read later</p>
            </div>
            <div id="wishlistResults" class="book-grid"></div>
        </section>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 Kitchen4Soul. Powered by Rakuten Web Service.</p>
    </footer>

    <script src="Kitchen4Soul.js?v=2"></script>
</body>
</html>
